<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrailFinder – Karte</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.4/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.4/mapbox-gl.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0c0a09;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            overflow: hidden
        }

        /* ── Map ─────────────────────────────────────── */
        #map-wrap {
            width: 100vw;
            height: 100vh;
            position: relative
        }

        #map {
            width: 100%;
            height: 100%
        }

        /* ── Event counter (top-left) ───────────────── */
        .event-counter {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 5;
            padding: 6px 14px;
            background: rgba(28, 25, 23, .88);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(245, 158, 11, .35);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #fbbf24;
            pointer-events: none;
        }

        /* ── Zoom info + Reset (top-right) ──────────── */
        .zoom-bar {
            position: absolute;
            top: 16px;
            right: 56px;
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .zoom-label {
            padding: 6px 12px;
            background: rgba(28, 25, 23, .88);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(120, 113, 108, .3);
            border-radius: 8px;
            font-size: 12px;
            color: #a8a29e;
        }

        .reset-btn {
            padding: 6px 14px;
            background: rgba(28, 25, 23, .88);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(120, 113, 108, .4);
            border-radius: 8px;
            font-size: 12px;
            color: #d6d3d1;
            cursor: pointer;
            transition: all .2s;
        }

        .reset-btn:hover {
            border-color: #f59e0b;
            color: #fbbf24
        }

        /* ── Legend (bottom-left) ───────────────────── */
        .legend {
            position: absolute;
            bottom: 32px;
            left: 16px;
            z-index: 5;
            background: rgba(28, 25, 23, .92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(120, 113, 108, .25);
            border-radius: 14px;
            padding: 14px 16px;
            min-width: 200px;
        }

        .legend-title {
            font-size: 11px;
            color: #a8a29e;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: .3px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 8px;
            margin: 2px -8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all .15s;
            user-select: none;
        }

        .legend-item:hover {
            background: rgba(255, 255, 255, .05)
        }

        .legend-item.inactive {
            opacity: .35
        }

        .legend-item.inactive .legend-label {
            text-decoration: line-through
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, .45);
            flex-shrink: 0;
            transition: all .15s;
        }

        .legend-item.inactive .legend-dot {
            border-color: rgba(255, 255, 255, .15)
        }

        .legend-label {
            font-size: 13px;
            color: #d6d3d1;
            transition: color .15s
        }

        /* ── Help hints (bottom-right) ──────────────── */
        .help-hints {
            position: absolute;
            bottom: 32px;
            right: 16px;
            z-index: 5;
            background: rgba(28, 25, 23, .85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(120, 113, 108, .2);
            border-radius: 10px;
            padding: 10px 14px;
        }

        .help-hint {
            font-size: 11px;
            color: #78716c;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 2px 0
        }

        /* ── Popup card ─────────────────────────────── */
        .mapboxgl-popup {
            z-index: 10
        }

        .mapboxgl-popup-content {
            background: #fff;
            border-radius: 14px;
            padding: 0;
            box-shadow: 0 12px 40px rgba(0, 0, 0, .35);
            border: none;
            min-width: 250px;
            max-width: 300px;
            overflow: hidden;
        }

        .mapboxgl-popup-tip {
            border-top-color: #fff
        }

        .mapboxgl-popup-close-button {
            color: #a8a29e;
            font-size: 20px;
            padding: 6px 10px;
            right: 2px;
            top: 2px;
            z-index: 2;
        }

        .mapboxgl-popup-close-button:hover {
            color: #1c1917;
            background: transparent
        }

        .popup-card {
            padding: 16px 16px 14px
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px
        }

        .popup-title {
            font-size: 16px;
            font-weight: 700;
            color: #1c1917;
            line-height: 1.3;
            flex: 1
        }

        .popup-badge {
            flex-shrink: 0;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            margin-top: 2px;
        }

        .popup-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #57534e;
            margin-bottom: 4px
        }

        .popup-price {
            font-weight: 700;
            color: #d97706
        }

        .popup-btn {
            display: block;
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            background: #f59e0b;
            color: #1c1917;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background .2s;
            letter-spacing: .2px;
        }

        .popup-btn:hover {
            background: #d97706
        }
    </style>
</head>

<body>
    <div id="map-wrap">
        <div id="map"></div>

        <!-- Event counter -->
        <div class="event-counter" id="eventCounter">8 Events</div>

        <!-- Zoom bar -->
        <div class="zoom-bar">
            <span class="zoom-label" id="zoomLabel">Zoom: 100%</span>
            <button class="reset-btn" id="resetBtn">Reset</button>
        </div>

        <!-- Legend -->
        <div class="legend" id="legend">
            <div class="legend-title">Kategorien (klicken zum Filtern)</div>
            <div id="legendItems"></div>
        </div>

        <!-- Help hints -->
        <div class="help-hints">
            <div class="help-hint">🖱️ Klicken = Popup öffnen</div>
            <div class="help-hint">🖐️ Ziehen = Karte bewegen</div>
            <div class="help-hint">🔍 Scrollen = Zoomen</div>
        </div>
    </div>

    <script>
        /* ── Data ────────────────────────────────────── */
        var events = [
            { id: 'ev1', title: 'Eifel Adventure Rally', category: 'rallyes', coordinates: [6.9475, 50.3356], location: 'Nürburgring, Deutschland', date: '2025-03-15', price: '€189', detailUrl: '#event/eifel-adventure-rally' },
            { id: 'ev2', title: 'Ardennes Mud Challenge', category: 'trail-adventures', coordinates: [5.8667, 50.4875], location: 'Spa, Belgien', date: '2025-04-05', price: '€245', detailUrl: '#event/ardennes-mud-challenge' },
            { id: 'ev3', title: 'Luxembourg Trail Days', category: 'trail-adventures', coordinates: [6.4218, 49.8153], location: 'Echternach, Luxemburg', date: '2025-04-20', price: '€320', detailUrl: '#event/luxembourg-trail-days' },
            { id: 'ev4', title: 'Black Forest Enduro', category: 'trail-adventures', coordinates: [7.8421, 47.9990], location: 'Freiburg, Deutschland', date: '2025-05-10', price: '€175', detailUrl: '#event/black-forest-enduro' },
            { id: 'ev5', title: 'Vosges Mountain Trophy', category: 'rallyes', coordinates: [7.3558, 48.0794], location: 'Colmar, Frankreich', date: '2025-06-01', price: '€210', detailUrl: '#event/vosges-mountain-trophy' },
            { id: 'ev6', title: 'Alps Adventure Camp', category: 'skills-camps', coordinates: [11.4041, 47.2692], location: 'Innsbruck, Österreich', date: '2025-07-15', price: '€450', detailUrl: '#event/alps-adventure-camp' },
            { id: 'ev7', title: 'Offroad Festival Trier', category: 'offroad-festivals', coordinates: [6.6371, 49.7490], location: 'Trier, Deutschland', date: '2025-08-20', price: '€85', detailUrl: '#event/offroad-festival-trier' },
            { id: 'ev8', title: 'Morocco Desert Tour', category: 'adventure-trips', coordinates: [-7.9811, 31.6295], location: 'Marrakesch, Marokko', date: '2025-09-10', price: '€1890', detailUrl: '#event/morocco-desert-tour' },
            { id: 'ev9', title: 'Hunsrück Gravel Ride', category: 'trail-adventures', coordinates: [7.3300, 49.8200], location: 'Idar-Oberstein, Deutschland', date: '2025-05-25', price: '€145', detailUrl: '#event/hunsrueck-gravel-ride' },
            { id: 'ev10', title: 'Mosel Enduro Days', category: 'skills-camps', coordinates: [6.6300, 50.0100], location: 'Cochem, Deutschland', date: '2025-06-14', price: '€295', detailUrl: '#event/mosel-enduro-days' }
        ];

        var categories = [
            { id: 'trail-adventures', label: 'Trail Adventures', color: '#f59e0b' },
            { id: 'rallyes', label: 'Rallyes', color: '#ef4444' },
            { id: 'adventure-trips', label: 'Adventure Trips', color: '#3b82f6' },
            { id: 'skills-camps', label: 'Skills Camps', color: '#10b981' },
            { id: 'offroad-festivals', label: 'Festivals', color: '#a855f7' }
        ];

        var catColorMap = {};
        var catLabelMap = {};
        categories.forEach(function (c) { catColorMap[c.id] = c.color; catLabelMap[c.id] = c.label; });

        /* ── Category filter state ──────────────────── */
        var activeCategories = {};
        categories.forEach(function (c) { activeCategories[c.id] = true; });

        var activeEventId = null;
        var INITIAL_CENTER = [6.1296, 49.8153];
        var INITIAL_ZOOM = 5;

        /* ── Map ────────────────────────────────────── */
        mapboxgl.accessToken = 'YOUR_MAPBOX_ACCESS_TOKEN';

        var map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11',
            center: INITIAL_CENTER,
            zoom: INITIAL_ZOOM,
            attributionControl: false
        });
        map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'top-right');
        map.addControl(new mapboxgl.AttributionControl({ compact: true }), 'bottom-right');

        /* ── Popup (single reusable instance) ───────── */
        var popup = new mapboxgl.Popup({ closeButton: true, closeOnClick: true, maxWidth: '310px', offset: 18, anchor: 'bottom' });
        popup.on('close', function () { setActiveEvent(null); });

        /* ── Build GeoJSON ──────────────────────────── */
        function buildGeoJSON() {
            return {
                type: 'FeatureCollection',
                features: events.map(function (ev) {
                    return {
                        type: 'Feature',
                        geometry: { type: 'Point', coordinates: ev.coordinates },
                        properties: {
                            id: ev.id,
                            title: ev.title,
                            location: ev.location,
                            date: ev.date,
                            price: ev.price,
                            category: ev.category,
                            color: catColorMap[ev.category] || '#f59e0b',
                            label: catLabelMap[ev.category] || ev.category,
                            detailUrl: ev.detailUrl
                        }
                    };
                })
            };
        }

        /* ── Map load ───────────────────────────────── */
        map.on('load', function () {
            var geojson = buildGeoJSON();

            map.addSource('events', { type: 'geojson', data: geojson });

            /* Glow layer – underneath, filtered to active event only */
            map.addLayer({
                id: 'events-glow',
                type: 'circle',
                source: 'events',
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 3, 18, 8, 28, 12, 36],
                    'circle-color': ['get', 'color'],
                    'circle-opacity': 0.30,
                    'circle-blur': 0.75
                },
                filter: ['==', ['get', 'id'], '']
            });

            /* Main circle markers – rendered on WebGL canvas */
            map.addLayer({
                id: 'events-circles',
                type: 'circle',
                source: 'events',
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 3, 7, 8, 11, 12, 15],
                    'circle-color': ['get', 'color'],
                    'circle-stroke-width': 3,
                    'circle-stroke-color': 'rgba(255,255,255,0.92)',
                    'circle-opacity': 0.95
                }
            });

            /* Click → open popup + set glow */
            map.on('click', 'events-circles', function (e) {
                if (!e.features || !e.features.length) return;
                var f = e.features[0];
                var p = f.properties;
                var coords = f.geometry.coordinates.slice();
                setActiveEvent(p.id);
                showPopup(coords, p);
            });

            /* Cursor on hover */
            map.on('mouseenter', 'events-circles', function () { map.getCanvas().style.cursor = 'pointer'; });
            map.on('mouseleave', 'events-circles', function () { map.getCanvas().style.cursor = ''; });

            /* Initial counter */
            updateEventCounter();
        });

        /* ── Zoom display ───────────────────────────── */
        map.on('zoom', function () {
            var z = map.getZoom();
            var pct = Math.round((z / 22) * 100);
            document.getElementById('zoomLabel').textContent = 'Zoom: ' + pct + '%';
        });

        /* ── Reset button ───────────────────────────── */
        document.getElementById('resetBtn').addEventListener('click', function () {
            map.flyTo({ center: INITIAL_CENTER, zoom: INITIAL_ZOOM, duration: 800 });
            popup.remove();
            setActiveEvent(null);
        });

        /* ── Resize ─────────────────────────────────── */
        window.addEventListener('resize', function () { map.resize(); });

        /* ── Active event (glow) ────────────────────── */
        function setActiveEvent(id) {
            activeEventId = id;
            if (!map.getLayer('events-glow')) return;
            if (id) {
                map.setFilter('events-glow', buildGlowFilter());
            } else {
                map.setFilter('events-glow', ['==', ['get', 'id'], '']);
            }
        }

        /* ── Category filtering ─────────────────────── */
        function getActiveCatList() {
            var list = [];
            for (var k in activeCategories) { if (activeCategories[k]) list.push(k); }
            return list;
        }

        function buildCatFilter() {
            var list = getActiveCatList();
            if (list.length === categories.length) return null;       // all active → no filter
            if (list.length === 0) return ['==', ['get', 'id'], '---'];  // none active → hide all
            return ['in', ['get', 'category'], ['literal', list]];
        }

        function buildGlowFilter() {
            var catF = buildCatFilter();
            var idF = activeEventId ? ['==', ['get', 'id'], activeEventId] : ['==', ['get', 'id'], ''];
            if (catF) return ['all', catF, idF];
            return idF;
        }

        function applyFilters() {
            if (!map.getLayer('events-circles')) return;
            var catF = buildCatFilter();
            map.setFilter('events-circles', catF);
            map.setFilter('events-glow', buildGlowFilter());
            updateEventCounter();
        }

        function updateEventCounter() {
            var list = getActiveCatList();
            var count = events.filter(function (ev) { return list.indexOf(ev.category) !== -1; }).length;
            document.getElementById('eventCounter').textContent = count + ' Event' + (count !== 1 ? 's' : '');
        }

        /* ── Popup helper ───────────────────────────── */
        function showPopup(coords, p) {
            var d = new Date(p.date);
            var dateStr = d.toLocaleDateString('de-DE', { day: '2-digit', month: 'short', year: 'numeric' });

            var html =
                '<div class="popup-card">' +
                '<div class="popup-header">' +
                '<div class="popup-title">' + p.title + '</div>' +
                '<span class="popup-badge" style="background:' + p.color + '">' + p.label + '</span>' +
                '</div>' +
                '<div class="popup-row">📍 ' + p.location + '</div>' +
                '<div class="popup-row">📅 ' + dateStr + '&nbsp;&nbsp;&nbsp;' +
                '<span class="popup-price">💰 ' + p.price + '</span>' +
                '</div>' +
                '<a class="popup-btn" href="' + (p.detailUrl || '#') + '">Details anzeigen →</a>' +
                '</div>';

            popup.setLngLat(coords).setHTML(html).addTo(map);
        }

        /* ── Legend (clickable filter) ──────────────── */
        (function buildLegend() {
            var container = document.getElementById('legendItems');
            categories.forEach(function (cat) {
                var item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = '<div class="legend-dot" style="background:' + cat.color + '"></div><span class="legend-label">' + cat.label + '</span>';
                item.addEventListener('click', function () {
                    activeCategories[cat.id] = !activeCategories[cat.id];
                    item.classList.toggle('inactive', !activeCategories[cat.id]);
                    applyFilters();
                    /* close popup if its event is now hidden */
                    if (activeEventId) {
                        var ev = events.find(function (e) { return e.id === activeEventId; });
                        if (ev && !activeCategories[ev.category]) { popup.remove(); setActiveEvent(null); }
                    }
                });
                container.appendChild(item);
            });
        })();
    </script>
</body>

</html>
