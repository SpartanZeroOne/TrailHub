[build]
  base      = "trailfinder-app"
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from   = "/api/geocode"
  to     = "/.netlify/functions/geocode"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security Headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Prevent Clickjacking
    X-Frame-Options = "DENY"
    # Legacy XSS filter (belt-and-suspenders)
    X-XSS-Protection = "1; mode=block"
    # Don't leak full referrer to third-party domains
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Force HTTPS for 2 years, include subdomains
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Content Security Policy
    # - script-src: own origin + wasm (Mapbox GL uses WebAssembly)
    # - style-src: own origin + inline (Tailwind) + Google Fonts
    # - img-src: own origin + data URIs + any HTTPS (avatars, map tiles)
    # - connect-src: own origin + Supabase (REST + Realtime WS) + Mapbox tiles
    # - worker-src: blob: (Mapbox GL spawns Web Workers)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://hmdkiteqapiahwvdbdyh.supabase.co wss://hmdkiteqapiahwvdbdyh.supabase.co https://api.mapbox.com https://events.mapbox.com; worker-src blob:; base-uri 'self'; form-action 'self'"

# Cache static assets aggressively (hashed filenames → safe)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache HTML (SPA entry point must stay fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"